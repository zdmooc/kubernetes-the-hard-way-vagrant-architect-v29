---
deploy-policy:
  stage: package
  image: bitnami/kubectl:latest
  script:
    - kubectl create -f https://github.com/kyverno/kyverno/releases/download/v1.10.0/install.yaml 2>/dev/null || true
    - kubectl wait --for=condition=available deployment/kyverno -n kyverno --timeout=180s
    - kubectl apply -f policy/policies/
  only:
    - main
