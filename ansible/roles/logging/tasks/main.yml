---
- name: Check if logging namespace exists
  command: kubectl get namespace logging
  register: logging_ns
  ignore_errors: true
  changed_when: false

- name: Create logging namespace
  command: kubectl create namespace logging
  when: logging_ns.rc != 0

- name: Apply Loki manifest
  command: kubectl apply -f /tmp/kubernetes/manifests/logging/loki/loki.yaml
  register: apply_loki
  changed_when: "'created' in apply_loki.stdout or 'configured' in apply_loki.stdout"

- name: Wait for Loki to be ready
  command: kubectl rollout status statefulset/loki -n logging --timeout=120s
  changed_when: false

- name: Apply Promtail manifest
  command: kubectl apply -f /tmp/kubernetes/manifests/logging/promtail/promtail.yaml
  register: apply_promtail
  changed_when: "'created' in apply_promtail.stdout or 'configured' in apply_promtail.stdout"

- name: Wait for Promtail to be ready
  command: kubectl rollout status daemonset/promtail -n logging --timeout=120s
  changed_when: false
