---
- name: Mettre à jour le cache apt
  apt:
    update_cache: yes
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"

- name: Installer les paquets de base
  apt:
    name:
      - curl
      - wget
      - vim
      - git
      - jq
      - net-tools
      - dnsutils
      - tcpdump
      - iptables
      - ntp
      - ntpdate
      - apt-transport-https
      - ca-certificates
      - gnupg
      - lsb-release
    state: present
  when: ansible_os_family == "Debian"

- name: Configurer le fuseau horaire
  timezone:
    name: Europe/Paris

- name: S'assurer que le service NTP est démarré
  service:
    name: ntp
    state: started
    enabled: yes

- name: Créer un utilisateur d'administration standard
  user:
    name: adminuser
    state: present
    shell: /bin/bash
    create_home: yes

- name: Configurer sudo sans mot de passe pour adminuser
  copy:
    dest: /etc/sudoers.d/adminuser
    content: "adminuser ALL=(ALL) NOPASSWD: ALL"
    mode: '0440'

- name: Désactiver le swap (requis pour Kubernetes)
  command: swapoff -a
  when: ansible_swaptotal_mb > 0

- name: Supprimer l'entrée swap dans fstab
  replace:
    path: /etc/fstab
    regexp: '^([^#].*?\sswap\s+sw\s+.*)$'
    replace: '# \1'

- name: Charger les modules kernel nécessaires
  modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: Configurer les paramètres sysctl pour Kubernetes
  sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    reload: yes
  loop:
    - { name: 'net.bridge.bridge-nf-call-iptables', value: '1' }
    - { name: 'net.bridge.bridge-nf-call-ip6tables', value: '1' }
    - { name: 'net.ipv4.ip_forward', value: '1' }
