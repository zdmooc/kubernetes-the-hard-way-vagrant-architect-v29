---
- name: Installer HAProxy
  apt:
    name: haproxy
    state: present
    update_cache: yes

- name: Configurer HAProxy pour le Control Plane Kubernetes
  copy:
    dest: /etc/haproxy/haproxy.cfg
    content: |
      global
          log /dev/log local0
          log /dev/log local1 notice
          chroot /var/lib/haproxy
          stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
          stats timeout 30s
          user haproxy
          group haproxy
          daemon

      defaults
          log global
          mode tcp
          option tcplog
          option dontlognull
          timeout connect 5000
          timeout client  50000
          timeout server  50000

      frontend kubernetes-apiserver
          bind *:6443
          mode tcp
          option tcplog
          default_backend kubernetes-control-plane

      backend kubernetes-control-plane
          mode tcp
          option tcp-check
          balance roundrobin
          default-server inter 10s downinter 5s rise 2 fall 2 slowstart 60s maxconn 250 maxqueue 256 weight 100
          server controller-0 10.240.0.20:6443 check
          server controller-1 10.240.0.21:6443 check
          server controller-2 10.240.0.22:6443 check
    mode: '0644'
  notify: restart haproxy

- name: Démarrer et activer HAProxy
  service:
    name: haproxy
    state: started
    enabled: yes

- name: Autoriser le port 6443 dans UFW
  ufw:
    rule: allow
    port: '6443'
    proto: tcp
    state: enabled
