apiVersion: v1
kind: ServiceAccount
metadata:
  name: viewer
  namespace: smoke
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: namespace-auditor
  namespace: smoke
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "configmaps", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: namespace-auditor-binding
  namespace: smoke
subjects:
  - kind: ServiceAccount
    name: viewer
    namespace: smoke
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: namespace-auditor
