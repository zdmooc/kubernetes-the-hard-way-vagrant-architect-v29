apiVersion: v1
kind: Namespace
metadata:
  name: smoke
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: smoke-reader
  namespace: smoke
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: smoke-readonly
  namespace: smoke
rules:
  - apiGroups: [""]
    resources: ["pods","services","endpoints","configmaps"]
    verbs: ["get","list","watch"]
  - apiGroups: ["apps"]
    resources: ["deployments","replicasets"]
    verbs: ["get","list","watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: smoke-readonly-binding
  namespace: smoke
subjects:
  - kind: ServiceAccount
    name: smoke-reader
    namespace: smoke
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: smoke-readonly
