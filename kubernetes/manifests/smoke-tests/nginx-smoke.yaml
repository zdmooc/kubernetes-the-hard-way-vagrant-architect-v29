apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-smoke
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-smoke
  template:
    metadata:
      labels:
        app: nginx-smoke
    spec:
      containers:
      - name: nginx
        image: nginx:1.27
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-smoke
spec:
  selector:
    app: nginx-smoke
  ports:
  - port: 80
    targetPort: 80
